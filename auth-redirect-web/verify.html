<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verify Request - Serene</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;800&display=swap');

        body {
            margin: 0;
            padding: 0;
            font-family: 'Manrope', sans-serif;
            background-color: #f8f9fa;
            color: #2d3748;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }

        .container {
            background: white;
            padding: 40px;
            border-radius: 24px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            text-align: center;
            max-width: 400px;
            width: 90%;
        }

        .icon {
            width: 80px;
            height: 80px;
            border-radius: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 24px auto;
            font-size: 32px;
        }

        .icon-default { background-color: #f0fdf4; color: #16a34a; }
        .icon-success { background-color: #f0fdf4; color: #16a34a; }
        .icon-error { background-color: #fef2f2; color: #dc2626; }

        h1 {
            font-size: 24px;
            font-weight: 800;
            margin: 0 0 12px 0;
            color: #2d3748;
        }

        p {
            font-size: 16px;
            color: #718096;
            line-height: 1.5;
            margin: 0 0 32px 0;
        }

        .actions {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .btn {
            display: inline-block;
            text-decoration: none;
            padding: 16px 32px;
            border-radius: 12px;
            font-weight: 600;
            transition: all 0.2s;
            text-align: center;
        }

        .btn-confirm { background-color: #16a34a; color: white; }
        .btn-confirm:hover { background-color: #15803d; transform: translateY(-1px); }
        .btn-decline { background-color: #f1f5f9; color: #64748b; }
        .btn-decline:hover { background-color: #e2e8f0; }
        .btn-close { background-color: #4f46e5; color: white; margin-top: 20px; }
    </style>
</head>
<body>

    <div class="container" id="content">
        <!-- Initial Review View -->
        <div id="review-view">
            <div class="icon icon-default">🧘‍♂️</div>
            <h1>Review Request</h1>
            <p>Would you like to confirm the subscription change for your Urian Solace AI account?</p>
            <div class="actions">
                <a id="btn-confirm" href="#" class="btn btn-confirm">Accept & Confirm</a>
                <a id="btn-decline" href="#" class="btn btn-decline">Decline Request</a>
            </div>
        </div>

        <!-- Result View (Success/Error) -->
        <div id="result-view" style="display: none;">
            <div id="result-icon" class="icon"></div>
            <h1 id="result-title"></h1>
            <p id="result-message"></p>
            <a href="#" onclick="window.close()" class="btn btn-close">Close Window</a>
        </div>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const requestId = params.get('id');
        const status = params.get('status');
        const message = params.get('message');
        const baseUrl = "https://rgucydqdqfwjnkveibhr.supabase.co/functions/v1/subscription-confirm";

        const reviewView = document.getElementById('review-view');
        const resultView = document.getElementById('result-view');
        const resultIcon = document.getElementById('result-icon');
        const resultTitle = document.getElementById('result-title');
        const resultMessage = document.getElementById('result-message');

        // Check if we are showing a result (Success/Error)
        if (status) {
            reviewView.style.display = 'none';
            resultView.style.display = 'block';
            
            if (status === 'success') {
                resultIcon.innerHTML = "✅";
                resultIcon.className = "icon icon-success";
                resultTitle.innerText = "Success!";
                resultMessage.innerText = message || "Your account has been updated.";
            } else {
                resultIcon.innerHTML = "❌";
                resultIcon.className = "icon icon-error";
                resultTitle.innerText = "Action Failed";
                resultMessage.innerText = message || "Something went wrong. Please try again.";
            }
        } 
        // Otherwise show the Review View
        else if (requestId) {
            document.getElementById('btn-confirm').href = `${baseUrl}?id=${requestId}&status=approved`;
            document.getElementById('btn-decline').href = `${baseUrl}?id=${requestId}&status=declined`;
        } else {
            document.getElementById('content').innerHTML = "<h1>Invalid Request</h1><p>We couldn't find a valid request in the link.</p>";
        }
    </script>
</body>
</html>
